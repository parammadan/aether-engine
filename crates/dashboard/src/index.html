<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Aether cluster</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: light;
    --surface: #fcfcfb; --panel: #f2f2ef; --border: #dedcd5;
    --text-1: #0b0b0b; --text-2: #52514e;
    --good: #0ca30c; --warning: #fab219; --serious: #ec835a; --critical: #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --surface: #1a1a19; --panel: #232322; --border: #3a3937;
      --text-1: #ffffff; --text-2: #c3c2b7;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface: #1a1a19; --panel: #232322; --border: #3a3937;
    --text-1: #ffffff; --text-2: #c3c2b7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px; background: var(--surface); color: var(--text-1);
    font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: var(--text-2); margin-bottom: 16px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .stat .label { color: var(--text-2); font-size: 12px; }
  .stat .value { font-size: 26px; font-weight: 650; font-variant-numeric: tabular-nums; }
  .stat .hint { color: var(--text-2); font-size: 12px; }
  .shards { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 12px; }
  .shard { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .shard h2 { font-size: 13px; font-weight: 600; margin: 0 0 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; }
  .node { border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; background: var(--surface); }
  .node .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .node .name { font-weight: 600; }
  .node .meta { color: var(--text-2); font-size: 12px; font-variant-numeric: tabular-nums; }
  /* Status: icon + word, always. Color never carries the state alone. */
  .status { font-size: 12px; font-weight: 600; white-space: nowrap; }
  .status.live     .dot { color: var(--good); }
  .status.stale    .dot { color: var(--warning); }
  .status.dead     .dot { color: var(--critical); }
  .status .dot { margin-right: 4px; }
  .role { font-size: 11px; border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; color: var(--text-2); }
  button {
    background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text-1);
    padding: 3px 10px; font-size: 12px; cursor: pointer;
  }
  button:hover { border-color: var(--text-2); }
  button.kill:hover { border-color: var(--critical); color: var(--critical); }
  .events { margin-top: 18px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .events h2 { font-size: 13px; margin: 0 0 8px; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; }
  .events ul { list-style: none; margin: 0; padding: 0; max-height: 220px; overflow-y: auto; }
  .events li { padding: 2px 0; color: var(--text-2); font-variant-numeric: tabular-nums; }
  .events li b { color: var(--text-1); font-weight: 600; }
  #conn { font-size: 12px; color: var(--text-2); }
</style>
</head>
<body>
  <h1>Aether cluster</h1>
  <div class="sub">Live view over WebSocket · killing a node is a real SIGKILL — recovery below is the cluster's own failover. <span id="conn">connecting…</span></div>

  <div class="stats" id="stats"></div>
  <div class="shards" id="shards"></div>

  <div class="events">
    <h2>Events</h2>
    <ul id="events"></ul>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  function statusOf(node) {
    // Icon + word, never color alone. Thresholds mirror the cluster's own liveness config.
    if (!node.has_process) return { cls: "dead", icon: "✕", word: "no process" };
    if (node.draining) return { cls: "stale", icon: "◌", word: "draining" };
    if (node.millis_since_seen > 3000) return { cls: "stale", icon: "▲", word: "stale " + (node.millis_since_seen/1000).toFixed(0) + "s" };
    return { cls: "live", icon: "●", word: "live" };
  }

  function render(s) {
    // --- Hero stat tiles ---
    const q = s.query || {};
    const last = q.last || {};
    const coverage = last && last.queried ? `${last.answered}/${last.queried}` : "–";
    const stats = [
      { label: "Queries OK", value: q.ok ?? 0, hint: "1/s through the coordinator" },
      { label: "Query errors", value: q.err ?? 0, hint: q.err > 0 ? "✕ failures seen" : "● none" },
      { label: "Shard coverage", value: coverage, hint: last.queried && last.answered < last.queried ? "▲ partial results" : "● full" },
      { label: "Matches (last)", value: last.total_matched ?? "–", hint: (last.ms ?? "–") + " ms" },
      { label: "Coordinator", value: s.coordinator && s.coordinator.reachable ? "up" : "down",
        hint: s.coordinator ? s.coordinator.addr : "" },
    ];
    $("stats").innerHTML = stats.map(t =>
      `<div class="stat"><div class="label">${t.label}</div><div class="value">${t.value}</div><div class="hint">${t.hint ?? ""}</div></div>`
    ).join("");

    // --- Node tiles grouped by shard ---
    const byShard = new Map();
    for (let i = 0; i < (s.shard_count || 0); i++) byShard.set(i, []);
    (s.nodes || []).forEach(n => {
      if (!byShard.has(n.shard_id)) byShard.set(n.shard_id, []);
      byShard.get(n.shard_id).push(n);
    });
    const vshardsOf = (shard) => {
      const owned = (s.vshard_group || []).map((g, v) => g === shard ? v : null).filter(v => v !== null);
      return owned.length ? ` · vshards ${owned.join(",")}` : "";
    };
    $("shards").innerHTML = [...byShard.entries()].map(([shard, nodes]) => `
      <div class="shard">
        <h2>Shard ${shard} · ${nodes.filter(n => n.role === "Leader").length ? "led" : "NO LEADER"} · ${nodes.length} node${nodes.length === 1 ? "" : "s"}${vshardsOf(shard)}</h2>
        ${nodes.map(n => {
          const st = statusOf(n);
          return `<div class="node">
            <div class="row">
              <span class="name">${n.node_id}</span>
              <span class="role">${n.role}</span>
            </div>
            <div class="row">
              <span class="meta">${n.address} · seen ${(n.millis_since_seen/1000).toFixed(1)}s ago</span>
              <span class="status ${st.cls}"><span class="dot">${st.icon}</span>${st.word}</span>
            </div>
            <div class="row" style="margin-top:6px; justify-content:flex-end; gap:6px;">
              ${n.has_process && !n.draining ? `<button onclick="drain('${n.node_id}')">drain</button>` : ""}
              ${n.has_process ? `<button class="kill" onclick="kill('${n.node_id}')">kill −9</button>` : ""}
            </div>
          </div>`;
        }).join("")}
        <button onclick="addFollower(${shard})">+ add follower</button>
      </div>
    `).join("");

    // --- Events (newest first) ---
    $("events").innerHTML = (s.events || []).slice().reverse().map(e =>
      `<li>+${(e.at_ms/1000).toFixed(1)}s <b>${e.msg}</b></li>`
    ).join("");
  }

  async function kill(nodeId) { await fetch(`/api/kill/${nodeId}`, { method: "POST" }); }
  async function drain(nodeId) { await fetch(`/api/drain/${nodeId}`, { method: "POST" }); }
  async function addFollower(shard) { await fetch(`/api/add-follower/${shard}`, { method: "POST" }); }

  function connect() {
    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => { $("conn").textContent = "· live"; };
    ws.onmessage = (m) => { try { render(JSON.parse(m.data)); } catch (_) {} };
    ws.onclose = () => { $("conn").textContent = "· reconnecting…"; setTimeout(connect, 1000); };
  }
  connect();
</script>
</body>
</html>
