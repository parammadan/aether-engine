syntax = "proto3";

// Versioned package: `aether.v1`. Versioning the wire contract from day one means a
// future breaking change becomes `aether.v2` served alongside v1, instead of a
// flag-day upgrade across coordinator + every shard node. Cheap now, expensive to retrofit.
package aether.v1;

// =============================================================================
// The document
// =============================================================================

// A single flight observation = one document. This is the unit we index, shard,
// replicate, and search. The schema is locked early so we never re-plumb the wire
// format later; fields for phases we haven't built yet (geo, embeddings) are present
// but unused for now.
message FlightDocument {
  // --- Identity ---
  string icao24 = 1;       // 24-bit ICAO transponder address. THE SHARD KEY.
  string callsign = 2;     // flight callsign, e.g. "UAL231". Primary keyword target.
  int64 observed_at = 3;   // observation time, unix epoch millis.

  // --- Spatial (used for geo pre-filter in a later phase) ---
  double latitude = 4;
  double longitude = 5;
  double altitude = 6;     // barometric altitude, meters.

  // --- Embeddable text (embedded in a later phase) ---
  string origin = 7;       // origin airport / country.
  string destination = 8;
  string aircraft_type = 9;

  // --- Metadata ---
  double velocity = 10;
  double heading = 11;
  double vertical_rate = 12;
  bool on_ground = 13;
  string tenant_id = 14;   // multi-tenancy handle; carried now, enforced later.
}

// =============================================================================
// Search  (data plane)
// =============================================================================
// A client can call Search on a single shard node directly, and the coordinator
// fans the SAME Search RPC out to every shard and merges the responses (scatter-gather).
// Keeping one Search contract for both means the coordinator is just another caller —
// no separate "internal" search API to maintain.

// A structured filter, evaluated AT THE SHARD before scoring/aggregation — pushdown is
// the economics of distributed querying (ship 12 docs, not 10,000). All conditions must
// hold (AND); OR stays out of scope until something concrete needs it. An unknown field
// or a type-mismatched test is an InvalidArgument, never a silent no-op filter.
message NumericRange {
  optional double min = 1; // inclusive lower bound (absent = unbounded below)
  optional double max = 2; // inclusive upper bound (absent = unbounded above)
}

message FilterCondition {
  // Text fields (equals, case-insensitive): callsign, origin, destination, aircraft_type,
  // tenant_id, icao24. Numeric fields (range): altitude, velocity, heading, vertical_rate,
  // latitude, longitude, observed_at (epoch ms — the time-window filter). Boolean (is):
  // on_ground.
  string field = 1;
  oneof test {
    string equals = 2;
    NumericRange range = 3;
    bool is = 4;
  }
}

message Filter {
  repeated FilterCondition conditions = 1; // AND of all conditions; empty = no filtering
}

message SearchRequest {
  string query = 1;   // keyword query over the text fields (callsign, origin, ...).
  uint32 limit = 2;   // max hits to return from THIS shard. 0 = server default.
  Filter filter = 3;  // optional structured filter, applied at the shard before ranking.
}

// Which index matched a hit — part of its provenance, so a mixed keyword+vector result
// set says how each hit was found rather than leaving the caller to guess.
enum IndexKind {
  INDEX_UNSPECIFIED = 0;
  INDEX_KEYWORD = 1;
  INDEX_VECTOR = 2;
}

// Per-hit provenance: the auditable account of a single result, attached at the shard at
// hit-construction time (never reconstructed later). Answers "who returned this, how
// fresh is it, how was it matched, where does it live."
message HitProvenance {
  string source_group = 1;  // the shard group that produced this hit (e.g. "shard-0")
  int64 observed_at = 2;    // when the document was observed (unix epoch millis) = freshness
  IndexKind index = 3;      // keyword or vector match
  double score = 4;         // the score, carried here too so a hit is self-describing
  int32 owning_vshard = 5;  // virtual shard owning this doc, or -1 under hash%N / single-node
}

message SearchHit {
  FlightDocument document = 1;
  double score = 2;   // relevance score from the inverted index; lets the coordinator
                      // merge hits from many shards into one globally-ranked list.
  HitProvenance provenance = 3;
}

// A shard the coordinator asked but did not merge, and why. `reason` is "timeout" (the
// shard was too slow for the per-shard deadline) or "unreachable" (connect/RPC failed) —
// the same distinction the deadline layer already logs.
message OmittedShard {
  string address = 1;
  string reason = 2;
}

// Per-query provenance manifest: the coordinator's auditable account of the WHOLE query —
// coverage, what was dropped and why, freshness envelope, timing, and which placement
// version answered. A degraded result says exactly how it was degraded.
message QueryManifest {
  uint32 shards_queried = 1;
  uint32 shards_answered = 2;
  repeated OmittedShard omitted = 3;
  uint32 deduped = 4;             // hits dropped as cross-shard duplicates during merge
  int64 freshest_observed_at = 5; // newest observation among returned hits (0 if none)
  int64 stalest_observed_at = 6;  // oldest observation among returned hits (0 if none)
  uint64 elapsed_ms = 7;          // wall time from fan-out to merged response
  uint64 placement_version = 8;   // vshard-table version that served this query
}

message SearchResponse {
  repeated SearchHit hits = 1;
  uint64 total_matched = 2; // matches before `limit` was applied. Needed later for
                            // correct cross-shard aggregation / "N of M results".
  string shard_id = 3;      // which shard produced these hits. The coordinator needs
                            // provenance to merge, de-duplicate, and report coverage.

  // Coverage, set by the coordinator on a merged response (0 on a single shard's reply):
  // how many shard leaders were asked vs. how many answered. `answered < queried` means the
  // results are partial (some shard was unreachable) rather than empty.
  uint32 shards_queried = 4;
  uint32 shards_answered = 5;

  // Per-query provenance, assembled by the coordinator on a merged response (absent on a
  // single shard's direct reply).
  QueryManifest manifest = 6;
}

// Vector (semantic) search. The caller embeds the query text ONCE and fans the resulting
// vector out, so every shard scores against the same query point; shards never re-embed.
message VectorSearchRequest {
  repeated float vector = 1; // the embedded query, L2-normalized
  uint32 limit = 2;          // max hits from THIS shard. 0 = server default.
  Filter filter = 3;         // optional structured filter, applied at the shard.
}

// =============================================================================
// Aggregation  (data plane)
// =============================================================================
// The engine can rank documents; aggregation lets it SUMMARIZE them — counts, histograms,
// geo-density, percentiles — as distributed work: each shard computes a PARTIAL, the
// coordinator MERGES partials. Every agg type here is chosen so its partial merges
// associatively (per-bucket sums, or a mergeable sketch) — the mergeability doctrine.

enum AggKind {
  AGG_UNSPECIFIED = 0;
  AGG_COUNT = 1;             // how many documents match
  AGG_VALUE_COUNTS = 2;      // count per distinct value of a text field
  AGG_TIME_HISTOGRAM = 3;    // count per fixed observed_at time-bucket (interval = ms)
  AGG_NUMERIC_HISTOGRAM = 4; // count per fixed numeric bucket of `field` (interval = width)
  AGG_GEO_GRID = 5;          // count per lat/lon grid cell (interval = cell size in degrees)
  AGG_PERCENTILES = 6;       // percentiles of a numeric `field`, via a mergeable sketch
}

message AggregateRequest {
  string query = 1;              // filter: keyword query over the text fields (empty = all)
  AggKind kind = 2;
  string field = 3;              // the field to aggregate (value-counts / numeric / percentiles)
  double interval = 4;           // time bucket ms | numeric bucket width | geo cell degrees
  repeated double percentiles = 5; // requested percentiles (e.g. 50, 95, 99) for AGG_PERCENTILES
  Filter filter = 6;             // optional structured filter, applied before aggregating
}

// A mergeable t-digest: parallel arrays of centroid means and weights. Merging two digests
// is concatenating their centroids and re-compressing — associative, so per-shard digests
// combine at the coordinator into one the whole cluster's percentiles read from.
message TDigest {
  repeated double centroid_mean = 1;
  repeated double centroid_weight = 2;
}

// A shard's partial aggregate (also the coordinator's merged result — same shape, because
// merging is closed over this type). Counts and bucket maps merge by summing; the digest
// merges by centroid union.
message AggregatePartial {
  AggKind kind = 1;
  uint64 count = 2;                // AGG_COUNT: matching documents
  map<string, uint64> buckets = 3; // value-counts / histograms / geo-grid: bucket key -> count
  TDigest digest = 4;              // AGG_PERCENTILES
}

message Percentile {
  double p = 1;     // the requested percentile (e.g. 99)
  double value = 2; // its value across the merged data
}

message AggregateResponse {
  AggregatePartial partial = 1;        // shard: its partial; coordinator: the merged partial
  repeated Percentile percentiles = 2; // coordinator resolves these from the merged digest
  QueryManifest manifest = 3;          // coverage etc. (absent on a single shard's reply)
}

// Served by every shard node.
service ShardSearch {
  rpc Search(SearchRequest) returns (SearchResponse);

  // k-nearest-neighbour search over the shard's vector index. Scores are cosine similarity,
  // so results from many shards can be merged by the same score-descending rule as keyword
  // search (SearchResponse is reused).
  rpc VectorSearch(VectorSearchRequest) returns (SearchResponse);

  // Compute a PARTIAL aggregate over this shard's documents; the coordinator merges partials
  // from every shard. One pass over the store, no per-document RPC amplification.
  rpc Aggregate(AggregateRequest) returns (AggregateResponse);
}

// =============================================================================
// Replication  (data plane)
// =============================================================================
// A shard leader forwards the documents it indexes to its follower(s), so a follower holds
// the same slice of data and can be promoted to serve it if the leader dies (primary-backup).

message ReplicateRequest {
  repeated FlightDocument documents = 1; // a batch the leader just indexed
  uint32 shard_id = 2;                    // provenance: which shard these belong to
}

message ReplicateResponse {
  uint32 applied = 1; // how many documents the follower applied
}

// Evict every document whose virtual shard is `vshard` (computed as hash(icao24) % v).
// Emitted when a virtual shard has migrated AWAY from this group: the old group must drop
// its now-stale copies. Carried through the raft log so every member evicts identically.
message EvictVShard {
  uint32 vshard = 1;
  uint32 v = 2; // the table length V (fixed for the cluster's life) — the modulus to use
}

// One entry in a shard group's replicated log. Committed entries are applied in order by
// every member, so both kinds — indexing a batch and evicting a migrated vshard — converge
// identically. (Snapshots remain a raw document dump; this envelope is the LOG format only.)
message ShardCommand {
  oneof kind {
    ReplicateRequest batch = 1;
    EvictVShard evict = 2;
  }
}

// Served by follower nodes; the leader is the client.
service Replication {
  rpc Replicate(ReplicateRequest) returns (ReplicateResponse);
}

// =============================================================================
// Consensus transport  (raft, within one shard group)
// =============================================================================
// Members of a shard's raft group exchange consensus messages over these RPCs. The payload
// is the raft library's own request/response types, serde-encoded: those types ARE the
// consensus protocol (terms, votes, log entries), so the wire layer stays a dumb carrier
// and upgrading the library never means re-modeling protobuf mirrors of its internals.

message RaftPayload {
  bytes data = 1; // serde-encoded raft message
}

service RaftTransport {
  rpc AppendEntries(RaftPayload) returns (RaftPayload);
  rpc Vote(RaftPayload) returns (RaftPayload);
  rpc InstallSnapshot(RaftPayload) returns (RaftPayload);
}

// =============================================================================
// Node registration  (control plane)
// =============================================================================
// A shard node announces itself to the coordinator on startup. This is what makes the
// cluster N-parameterized and dynamically discovered instead of a hardcoded node list:
// the coordinator learns the topology at runtime from these registrations.
// The RPC is defined contract-first; the coordinator handles it.

enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0; // proto3 requires a 0 default; treat as "unknown".
  NODE_ROLE_LEADER = 1;      // owns the authoritative copy of its shard.
  NODE_ROLE_FOLLOWER = 2;    // replica; promoted to leader on failover.
}

message RegisterNodeRequest {
  string node_id = 1;   // stable identity of this node across restarts.
  string address = 2;   // host:port the coordinator will dial for Search.
  uint32 shard_id = 3;  // which shard this node serves = hash(icao24) % N.
  NodeRole role = 4;    // leader or follower replica.
}

message RegisterNodeResponse {
  bool accepted = 1;
  uint32 cluster_size = 2; // the coordinator's current view of N. Echoed back so nodes
                           // never assume a fixed cluster size — N is always runtime state.
  string message = 3;      // human-readable reason on rejection (e.g. duplicate node_id).
}

// A leader asks the coordinator which followers serve its shard, so it knows where to
// replicate. Discovery stays dynamic — the leader never hardcodes its replica addresses.
message ListReplicasRequest {
  uint32 shard_id = 1;
}

message ListReplicasResponse {
  repeated string addresses = 1; // follower addresses for the shard
}

// A node proves it's still alive by heartbeating. The coordinator drops nodes it hasn't
// heard from within a timeout, so a dead node stops being routed to.
message HeartbeatRequest {
  string node_id = 1;
  // Set by consensus-managed nodes that currently lead their shard's raft group. For those
  // shards the coordinator's shard map is a VIEW of raft state, not an authority: a leader
  // report updates routing (the previous leader is demoted in the map). Elections happen in
  // the group; the coordinator just learns about them.
  bool raft_leader = 2;
}

message HeartbeatResponse {
  bool known = 1; // false => the coordinator doesn't know this node (e.g. it restarted);
                  // the node should register again.
  NodeRole current_role = 2; // the coordinator's current view of this node's role (set when
                             // known). A node adopts this — e.g. a promoted follower learns
                             // it is now the shard's leader — and re-registers with it, so a
                             // coordinator restart can't demote a promoted node back to its
                             // boot-time role.
}

// A progressively-refined search result. The coordinator emits one of these each time
// another shard reports, so a client watches results converge instead of waiting for the
// slowest shard. Hits are the best-so-far, globally ranked.
message SearchUpdate {
  repeated SearchHit hits = 1;
  uint64 total_matched = 2;   // running cluster-wide total of matches so far
  uint32 shards_answered = 3; // shards that have reported so far
  uint32 shards_queried = 4;  // total shards asked
  bool complete = 5;          // true on the final update (all shards reported or timed out)
  QueryManifest manifest = 6; // assembled and emitted on the final (complete) update
}

// Served by the coordinator.
service Coordinator {
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);

  // Client-facing search entry point. The coordinator fans this out to every shard leader
  // (the SAME ShardSearch.Search RPC), merges the per-shard hits into one ranked list, and
  // reports coverage. This is scatter-gather.
  rpc Search(SearchRequest) returns (SearchResponse);

  // Streaming scatter-gather: the coordinator streams a refined result each time a shard
  // reports, so results materialize progressively (a shard dying mid-stream just means its
  // update never arrives — the rest keep converging).
  rpc SearchStream(SearchRequest) returns (stream SearchUpdate);

  // Vector scatter-gather: the caller embeds the query text ONCE and the coordinator fans
  // the vector to every shard leader's VectorSearch, merging by the same score-descending
  // rule (scores are cosine similarity on both paths).
  rpc VectorSearch(VectorSearchRequest) returns (SearchResponse);

  // Aggregation scatter-gather: fan the aggregate to every shard leader, merge the
  // partials, resolve percentiles, and report coverage in the manifest.
  rpc Aggregate(AggregateRequest) returns (AggregateResponse);

  // Hybrid search: run BOTH keyword and vector search for the query text and fuse the two
  // rankings by Reciprocal Rank Fusion (rank-based, so the incomparable BM25 and cosine
  // score scales never meet). The coordinator embeds the query text itself. Same
  // SearchRequest/SearchResponse contract; each hit's provenance says which index found it.
  rpc HybridSearch(SearchRequest) returns (SearchResponse);

  // Followers of a shard, so a leader can discover where to replicate.
  rpc ListReplicas(ListReplicasRequest) returns (ListReplicasResponse);

  // Liveness: a node periodically proves it's alive; silent nodes are dropped.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Observability: the coordinator's current view of the cluster (who leads/follows each
  // shard and how recently each node was seen). Consumed by dashboards/tooling.
  rpc GetClusterState(ClusterStateRequest) returns (ClusterStateResponse);

  // Every registered member of one shard, regardless of role. Consensus-managed members use
  // this to discover their raft group: register, poll until the group is complete, then the
  // member with the smallest raft id initializes it (deterministic over the same set).
  rpc ListShardMembers(ShardMembersRequest) returns (ShardMembersResponse);

  // Deliberately mark a node for removal from its shard's consensus group. Removal is
  // OPERATOR intent, never inferred from liveness (a flapping heartbeat must not be able to
  // shrink quorum); the group's elected leader executes it, refusing to go below a safe
  // voter count. Combined with a join, this is a live replica relocation.
  rpc DrainNode(DrainRequest) returns (DrainResponse);

  // Virtual-shard placement: nodes poll this to learn which virtual shards their group
  // serves (ingestion filters by it), and an operator moves load by reassigning a virtual
  // shard to another group.
  rpc GetVShardAssignments(VShardAssignmentsRequest) returns (VShardAssignments);
  rpc ReassignVShard(ReassignVShardRequest) returns (ReassignVShardResponse);
}

message DrainRequest {
  string node_id = 1;
}

message DrainResponse {
  bool ok = 1;
  string message = 2;
}

message ShardMembersRequest {
  uint32 shard_id = 1;
}

message ShardMembersResponse {
  repeated NodeState members = 1;
}

message ClusterStateRequest {}

message NodeState {
  string node_id = 1;
  string address = 2;
  NodeRole role = 3;
  uint32 shard_id = 4;
  uint64 millis_since_seen = 5; // age of the last registration/heartbeat
  bool draining = 6; // marked for deliberate removal; its group's leader will remove it
                     // from consensus membership and it must never be re-added
}

message ClusterStateResponse {
  uint32 shard_count = 1; // N (the number of groups)
  repeated NodeState nodes = 2;
  // Virtual-shard placement, when enabled: index = virtual shard, value = the group serving
  // it. Placement is hash(icao24) % V with V fixed forever; growth/rebalancing reassigns
  // whole virtual shards between groups instead of ever changing the modulus.
  repeated uint32 vshard_group = 3;
}

// =============================================================================
// Virtual shards  (placement that can move)
// =============================================================================

message VShardAssignmentsRequest {}

message VShardAssignments {
  repeated uint32 group_of = 1; // index = virtual shard, value = owning group; empty = disabled
}

message ReassignVShardRequest {
  uint32 vshard = 1;
  uint32 group = 2;
}

message ReassignVShardResponse {
  bool ok = 1;
  string message = 2;
}
