# Fly.io deployment of the live dashboard — a public, clickable Aether demo.
#
#   fly launch --no-deploy       # once, to create the app (or `fly apps create aether-demo`)
#   fly deploy                   # build the image and ship it
#   fly open                     # open the running dashboard in a browser
#
# The single VM runs the dashboard, which spawns the whole cluster (coordinator + a leader
# and follower per shard) as child processes inside the container — synthetic data, so no
# outbound network is needed. Visitors can hit the kill-9 button and watch failover live.

app = "aether-demo"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  AETHER_DASHBOARD_ADDR = "0.0.0.0:8080"   # bind all interfaces so Fly can route to it
  AETHER_SHARD_COUNT = "3"
  AETHER_SOURCE = "synthetic"              # self-contained; no OpenSky network dependency
  AETHER_METRICS_ADDR = "off"              # the demo VM exposes only the dashboard port

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"              # scale to zero when idle (cost control)
  auto_start_machines = true               # wake on the next request
  min_machines_running = 0

# A small dedicated VM: the dashboard plus ~5 child processes on a synthetic corpus fit
# comfortably; bump memory if you raise AETHER_SHARD_COUNT.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
